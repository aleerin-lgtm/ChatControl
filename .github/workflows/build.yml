name: Build Plugin
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn clean package --batch-mode
      - uses: actions/upload-artifact@v4
        with:
          name: Plugin-JAR
          path: target/*.jar
